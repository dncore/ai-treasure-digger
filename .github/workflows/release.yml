name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AI Treasure Digger ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download and install.

            - **Windows Portable**: `AI-Treasure-Digger_x64_portable.zip` — unzip and run, no installation needed (requires WebView2)
            - **Windows Installer**: `.msi` or `.exe` (NSIS)
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Package portable Windows build
        if: ${{ matrix.platform == 'windows-latest' }}
        shell: pwsh
        run: |
          $exe = "src-tauri/target/release/ai-treasure-digger.exe"
          if (-Not (Test-Path $exe)) {
            Write-Error "Portable exe not found at $exe"
            exit 1
          }
          $dir = "portable-package"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item $exe "$dir/AI Treasure Digger.exe"
          New-Item -ItemType File -Force -Path "$dir/portable.marker" | Out-Null
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "$dir/*" -DestinationPath "AI-Treasure-Digger_${tag}_x64_portable.zip"
          Write-Host "Created AI-Treasure-Digger_${tag}_x64_portable.zip"

      - name: Upload portable Windows build
        if: ${{ matrix.platform == 'windows-latest' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          ZIP="AI-Treasure-Digger_${TAG}_x64_portable.zip"
          gh release upload "$TAG" "$ZIP" --clobber
